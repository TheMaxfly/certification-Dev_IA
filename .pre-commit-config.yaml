# Hooks pre-commit communs au dépôt.
# Installation :  pre-commit install
# Mise à jour des versions :  pre-commit autoupdate
# Adoption progressive : ruff --fix + ruff-format ne s'appliquent qu'aux fichiers
# modifiés lors d'un commit, pas à tout le dépôt existant.

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: detect-private-key
      - id: check-merge-conflict

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.14
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format
