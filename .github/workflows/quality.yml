name: quality

# Gate qualité racine, volontairement INDICATIF (non bloquant) pour l'instant :
# chaque étape est en continue-on-error afin de rendre le rapport visible sans
# bloquer les merges tant que le code existant n'a pas été aligné.
# Durcissement prévu une fois la base nettoyée (retirer les continue-on-error).

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tools
        run: python -m pip install --upgrade pip ruff bandit pip-audit

      # Ruff est exécuté PAR MODULE : chaque module a sa propre config (ruff.toml
      # ou [tool.ruff]) avec sa cible Python et ses exclusions. Un `ruff check .`
      # depuis la racine appliquerait la config racine à tout et ignorerait ces
      # réglages ; itérer sur les dossiers de modules respecte les configs imbriquées.
      - name: Ruff lint (indicatif, par module)
        continue-on-error: true
        run: |
          for d in [0-9][0-9]_*/; do
            echo "::group::ruff check $d"
            ruff check --output-format=github "$d" || true
            echo "::endgroup::"
          done

      - name: Ruff format check (indicatif, par module)
        continue-on-error: true
        run: |
          for d in [0-9][0-9]_*/; do
            echo "::group::ruff format --check $d"
            ruff format --check "$d" || true
            echo "::endgroup::"
          done

      - name: Bandit (indicatif)
        continue-on-error: true
        run: bandit -r . -x ./.venv,./venv,./build,./dist

      - name: pip-audit (indicatif, dépendances transitives non contrôlables)
        continue-on-error: true
        run: |
          for req in $(git ls-files '*requirements*.txt'); do
            echo "::group::pip-audit $req"
            pip-audit -r "$req" || true
            echo "::endgroup::"
          done

  # À activer plus tard, par module, une fois un environnement de test unifié en place :
  #   - Pyright (type checking, mode basic)
  #   - pytest + pytest-cov (aucun test dans le dépôt pour l'instant)
