# Configuration Ruff commune au dépôt (monorepo).
# Conforme au standard : line-length 88, règles E/W/F/I/B/C4/UP.
# Note : le module 05 possède son propre [tool.ruff] (pyproject) qui prime pour
# ses fichiers ; à aligner sur cette base lors de l'harmonisation des modules.

line-length = 88
target-version = "py39"  # plancher commun (03 vise 3.9) ; certains modules ciblent plus haut

extend-exclude = [
    ".venv",
    "venv",
    "build",
    "dist",
    "*.egg-info",
    "crawls",
    "exports",
    "bench_out",
]

[lint]
select = ["E", "W", "F", "I", "B", "C4", "UP"]

[format]
docstring-code-format = true
